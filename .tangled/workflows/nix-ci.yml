when:
  - event: [ "push", "pull_request", "manual" ]
    branch: master
engine: nixery
steps:
  - name: "Build: blackwell"
    command: |
      nix build .#nixosConfigurations.blackwell.config.system.build.toplevel --accept-flake-config --builders "" --no-link --print-build-logs
  - name: "Build: date"
    command: |
      nix build .#nixosConfigurations.date.config.system.build.toplevel --accept-flake-config --builders "" --no-link --print-build-logs
  - name: "Build: kiwi"
    command: |
      nix build .#nixosConfigurations.kiwi.config.system.build.toplevel --accept-flake-config --builders "" --no-link --print-build-logs
  - name: "Build: pear"
    command: |
      nix build .#nixosConfigurations.pear.config.system.build.toplevel --accept-flake-config --builders "" --no-link --print-build-logs
  - name: "Build: plum"
    command: |
      nix build .#nixosConfigurations.plum.config.system.build.toplevel --accept-flake-config --builders "" --no-link --print-build-logs
  - name: "Build: sloe"
    command: |
      nix build .#nixosConfigurations.sloe.config.system.build.toplevel --accept-flake-config --builders "" --no-link --print-build-logs
  - name: "Build: yuzu"
    command: |
      nix build .#nixosConfigurations.yuzu.config.system.build.toplevel --accept-flake-config --builders "" --no-link --print-build-logs
  - name: "Check: deadnix"
    command: |
      nix build .#checks.x86_64-linux.deadnix --accept-flake-config --builders "" --no-link --print-build-logs
  - name: "Check: legacy imports"
    command: |
      nix build .#checks.x86_64-linux.nix-path --accept-flake-config --builders "" --no-link --print-build-logs
  - name: "Check: statix"
    command: |
      nix build .#checks.x86_64-linux.statix --accept-flake-config --builders "" --no-link --print-build-logs
